<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <main>

        <h1>Что сегодня по задачам?</h1>

        <form class="task-form">
            <label for="new-task-input">Новая задача</label>
            <input id="new-task-input" name="task" type="text" placeholder="Какая задача на сегодня?">
            <button class="add-task" type="submit">Добавить задачу</button>
        </form>

        <div class="filters" id="filters">
            <p>Фильтры</p>
            <button class="task-filter-btn" id="filter-all" type="button">Все задачи</button>
            <button class="task-filter-btn" id="filter-active" type="button">Активные</button>     
            <button class="task-filter-btn" id="filter-completed" type="button">Выполненные</button>
        </div>

        <div class="task-list">
            <ul id="task-items">
            </ul>
        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
