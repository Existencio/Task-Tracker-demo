<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <main>

        <h1>TO DO TODAY</h1>

        <form class="task-form">
            <label for="task-input">Новая задача:</label>
            <input id="task-input" name="task" type="text" placeholder="Какая задача на сегодня?">
            <button class="add-task" type="submit">Добавить</button>
        </form>

        <div class="filters" id="filters">
            <p>Фильтры</p>
            <div class="filter-buttons">
                <button class="task-filter-btn filter-highlighted" id="filter-all-button" type="button">Все задачи</button> <!-- класс filter-highlighted нужен для подсветки активной кнопки. у кнопки "Все задачи" он есть по умолчанию т.к. она изначально выбрана и подсвечена-->
                <button class="task-filter-btn" id="filter-active-button" type="button">Активные</button> <!-- у остальных кнопок он добавляется/удаляется при клике-->
                <button class="task-filter-btn" id="filter-completed-button" type="button">Выполненные</button> <!-- что реализовано через JS-->
            </div>
            <p id="active-tasks-count">Активных задач: 0</p>
        </div>

        <div class="task-list">
            <ul id="task-list">
            </ul>
        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
