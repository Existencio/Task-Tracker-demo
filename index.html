<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
</head>

<body>
    <main>

        <h1>Что сегодня по задачам?</h1>

        <form class="task-form">
            <label for="task-text">Новая задача</label>
            <input id="task-text" name="task" type="text" placeholder="Какая задача на сегодня?">
            <button type="submit">Добавить задачу</button>
        </form>

        <div class="task-list">
            <ul id="task-items">
                <li>Здесь будет задача</li>
            </ul>
        </div>

    </main>
</body>
</html>
