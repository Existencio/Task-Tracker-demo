<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
</head>

<body>
    <main>

        <h1>Что сегодня по задачам?</h1>

        <form class="task-form">
            <input type="text" placeholder="Какая за задача на сегодня?">
            <button>Добавить задачу</button>
        </form>

        <div class="task-list">
            <p>Здесь будет список задач</p>
        </div>

    </main>
</body>
</html>
